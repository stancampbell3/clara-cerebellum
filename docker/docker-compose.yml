# Clara PoC Stack — Docker Compose
#
# Build context: Development/ (two levels up from this file)
# Run from Development/:
#   docker compose -f clara-cerebrum/docker/docker-compose.yml --env-file clara-cerebrum/docker/.env up -d
#
# Or from this directory:
#   docker compose --env-file .env up -d

services:
  kafka:
    image: apache/kafka:latest
    ports:
      # 9094 is the external listener — used by cargo run / ./Dis on the host
      - "127.0.0.1:9094:9094"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      # INTERNAL: for containers on clara-net; EXTERNAL: for host processes; CONTROLLER: KRaft
      - KAFKA_LISTENERS=INTERNAL://:9092,EXTERNAL://:9094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - clara-net

  clara-api:
    build:
      context: ../..
      dockerfile: clara-cerebrum/docker/Dockerfile
      target: clara-api
    image: clara-api:latest
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:9090:9090"
    environment:
      - RUST_LOG=info
      - JWT_SECRET=${JWT_SECRET}
      - FIERYPIT_URL=http://lildaemon:6666
      - KAFKA_BOOTSTRAP=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      # FastText model files (860 MB) mounted read-only — not baked into image
      - ../models:/etc/clara/models:ro
      # Coire DuckDB — persists across container rebuilds
      - ../data:/app/data
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/8080"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    restart: unless-stopped
    networks:
      - clara-net

  prolog-mcp:
    build:
      context: ../..
      dockerfile: clara-cerebrum/docker/Dockerfile
      target: prolog-mcp
    image: clara-prolog-mcp:latest
    ports:
      - "127.0.0.1:1968:1968"
    environment:
      - REST_API_URL=http://clara-api:8080
    depends_on:
      clara-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1968"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - clara-net

  clips-mcp:
    build:
      context: ../..
      dockerfile: clara-cerebrum/docker/Dockerfile
      target: clips-mcp
    image: clara-clips-mcp:latest
    ports:
      - "127.0.0.1:1951:1951"
    environment:
      - REST_API_URL=http://clara-api:8080
    depends_on:
      clara-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/1951"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    restart: unless-stopped
    networks:
      - clara-net

  lildaemon:
    build:
      context: ../..
      dockerfile: clara-cerebrum/docker/Dockerfile.lildaemon
    image: lildaemon:latest
    ports:
      - "127.0.0.1:6666:6666"
    environment:
      - CEREBELLUM_URL=http://clara-api:8080
      - LILDAEMON_JWT_SECRET=${LILDAEMON_JWT_SECRET}
      - LILDAEMON_BASE_URL=http://lildaemon:6666
      - LILDAEMON_DB_PATH=/app/data/lildaemon.duc
      - LILDAEMON_OUTPUT_DIR=/app/output
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ../lildaemon/data:/app/data
      - ../lildaemon/output:/app/output
    depends_on:
      clara-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bash", "-c", "echo > /dev/tcp/localhost/6666"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 15s
    restart: unless-stopped
    networks:
      - clara-net

  cobbler:
    build:
      context: ../..
      dockerfile: clara-cerebrum/docker/Dockerfile.cobbler
    image: cobbler:latest
    ports:
      - "127.0.0.1:5001:5001"
    environment:
      - LILDAEMON_URL=http://lildaemon:6666
      - DIS_URL=http://clara-api:8080
      - LILD_SESSIONS_DIR=/lild-output/sessions
      - LILD_SESSION_GLOB=/lild-output/context/mu_*.json
      - COBBLER_BASE_PATH=/cobbler
    volumes:
      - ../lildaemon/output:/lild-output
    depends_on:
      lildaemon:
        condition: service_healthy
      clara-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clara-net

  clara-frontdesk:
    build:
      context: ../..
      dockerfile: clara-cerebrum/docker/Dockerfile
      target: frontdesk
    image: clara-frontdesk:latest
    ports:
      - "127.0.0.1:8088:8088"
    depends_on:
      clara-api:
        condition: service_healthy
      lildaemon:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clara-net

networks:
  clara-net:
    driver: bridge
