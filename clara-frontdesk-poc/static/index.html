<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City of Dis — Front Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0d0d0d;
    --surface:      #1a1010;
    --border:       #3d1a1a;
    --ember:        #c0392b;
    --ember-lo:     #7b1a1a;
    --ash:          #8a8a8a;
    --bone:         #d4c8b8;
    --agent-fill:   rgba(22, 10, 10, 0.93);
    --agent-border: #7b1a1a;
    --user-fill:    rgba(8, 20, 38, 0.93);
    --user-border:  #1a3a5a;
    --admitted:     #1a4a1a;
    --denied:       #4a1a1a;
    --redirect:     #2a2a1a;
    --font-body:    "IM Fell English", Georgia, serif;
    --font-head:    "Cinzel", Georgia, serif;
    --font-deco:    "Cinzel Decorative", Georgia, serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--bone);
    font-family: var(--font-body);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ───────────────────────────────────────────────────────────── */

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-family: var(--font-head);
    position: relative;
    z-index: 10;
  }

  header h1 {
    font-size: 1.05rem;
    color: var(--ember);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  #status-badge {
    margin-left: auto;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.7rem;
    font-family: var(--font-head);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border: 1px solid var(--border);
    background: #111;
    color: var(--ash);
    transition: background 0.4s, color 0.4s;
  }

  #status-badge.admitted   { background: var(--admitted); color: #7effa0; border-color: #3a8a3a; }
  #status-badge.denied     { background: var(--denied);   color: #ff9090; border-color: #8a3a3a; }
  #status-badge.redirected { background: var(--redirect); color: #ffd070; border-color: #8a7a3a; }
  #status-badge.active     { color: var(--bone); }

  /* ── Messages container — holds Minos bg + scrollable messages ──────── */

  #messages-container {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  /* Minos character background image */
  #minos-bg {
    position: absolute;
    bottom: 0;
    right: 0;
    width: min(46vw, 500px);
    height: 95%;
    object-fit: contain;
    object-position: bottom right;
    opacity: 0.48;
    transition: opacity 0.45s ease;
    pointer-events: none;
    z-index: 0;
    /* Soft fade on the left edge so text isn't fought over */
    -webkit-mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.6) 18%, black 40%);
    mask-image: linear-gradient(to right, transparent 0%, rgba(0,0,0,0.6) 18%, black 40%);
  }

  #minos-bg.fading { opacity: 0; }

  /* Subtle vignette over the whole messages area for depth */
  #messages-container::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 15% 50%, rgba(13,0,0,0.22) 0%, transparent 100%),
      linear-gradient(to bottom, rgba(13,0,0,0.35) 0%, transparent 18%, transparent 82%, rgba(13,0,0,0.35) 100%);
    pointer-events: none;
    z-index: 1;
  }

  #messages {
    position: absolute;
    inset: 0;
    overflow-y: auto;
    padding: 1.2rem 1rem 1.2rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 1.1rem;
    z-index: 2;
  }

  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--ember-lo); border-radius: 2px; }

  /* ── Message wrapper (label + balloon) ──────────────────────────────── */

  .msg-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.22rem;
    max-width: 64%;
    animation: bubbleIn 0.22s ease-out both;
  }

  @keyframes bubbleIn {
    from { opacity: 0; transform: translateY(8px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0)   scale(1);    }
  }

  .msg-wrap.agent { align-self: flex-start; align-items: flex-start; }
  .msg-wrap.user  { align-self: flex-end;   align-items: flex-end;   }

  .msg-label {
    font-family: var(--font-head);
    font-size: 0.62rem;
    text-transform: uppercase;
    letter-spacing: 0.13em;
    padding: 0 0.55rem;
    user-select: none;
  }
  .msg-wrap.agent .msg-label { color: var(--ember); }
  .msg-wrap.user  .msg-label { color: #4a8ab8; }

  /* ── Speech balloons ─────────────────────────────────────────────────── */

  .bubble {
    position: relative;
    padding: 0.68rem 1rem;
    line-height: 1.6;
    font-size: 0.92rem;
    white-space: pre-wrap;
    overflow: visible; /* tails extend outside */
  }

  /* Agent balloon — rounded top-left = tail attachment point, tail on left */
  .bubble.agent {
    background: var(--agent-fill);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid var(--agent-border);
    border-radius: 2px 16px 16px 16px;
    color: var(--bone);
    margin-left: 15px;
  }

  /* Tail border layer (ember color) */
  .bubble.agent::before {
    content: '';
    position: absolute;
    top: 12px;
    left: -14px;
    width: 14px;
    height: 22px;
    background: var(--agent-border);
    clip-path: polygon(100% 0, 100% 100%, 0 50%);
  }

  /* Tail fill layer (matches bubble background) */
  .bubble.agent::after {
    content: '';
    position: absolute;
    top: 13px;
    left: -12px;
    width: 12px;
    height: 20px;
    background: rgba(22, 10, 10, 0.97);
    clip-path: polygon(100% 0, 100% 100%, 0 50%);
  }

  /* User balloon — rounded top-right = tail attachment point, tail on right */
  .bubble.user {
    background: var(--user-fill);
    backdrop-filter: blur(5px);
    -webkit-backdrop-filter: blur(5px);
    border: 1px solid var(--user-border);
    border-radius: 16px 2px 16px 16px;
    color: #b8c8d8;
    margin-right: 15px;
  }

  /* Tail border layer */
  .bubble.user::before {
    content: '';
    position: absolute;
    top: 12px;
    right: -14px;
    width: 14px;
    height: 22px;
    background: var(--user-border);
    clip-path: polygon(0 0, 0 100%, 100% 50%);
  }

  /* Tail fill layer */
  .bubble.user::after {
    content: '';
    position: absolute;
    top: 13px;
    right: -12px;
    width: 12px;
    height: 20px;
    background: rgba(8, 20, 38, 0.97);
    clip-path: polygon(0 0, 0 100%, 100% 50%);
  }

  /* System notes — no balloon */
  .system-note {
    align-self: center;
    color: var(--ash);
    font-size: 0.78rem;
    font-style: italic;
    max-width: 90%;
    text-align: center;
    padding: 0.15rem 0;
  }

  .thinking {
    align-self: flex-start;
    color: var(--ember-lo);
    font-size: 0.8rem;
    font-style: italic;
    padding-left: 1rem;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:.35} 50%{opacity:1} }

  /* ── Footer ───────────────────────────────────────────────────────────── */

  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    gap: 0.5rem;
    position: relative;
    z-index: 10;
  }

  #input {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid var(--border);
    color: var(--bone);
    padding: 0.5rem 0.75rem;
    font-family: var(--font-body);
    font-size: 0.92rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input:focus { border-color: var(--ember-lo); }
  #input:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn {
    background: var(--ember-lo);
    border: none;
    color: var(--bone);
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: var(--font-head);
    font-size: 0.8rem;
    letter-spacing: 0.06em;
    border-radius: 3px;
    transition: background 0.2s;
  }
  #send-btn:hover { background: var(--ember); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #conn-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    margin-right: 0.25rem;
    display: inline-block;
    flex-shrink: 0;
    align-self: center;
  }
  #conn-indicator.open    { background: #4a8a4a; }
  #conn-indicator.closed  { background: #8a4a4a; }
  #conn-indicator.error   { background: var(--ember); }

  /* ── Outcome screen ──────────────────────────────────────────────────── */

  #outcome {
    display: none;
    position: fixed;
    inset: 0;
    background: #080808;
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    padding: 2rem;
    text-align: center;
    animation: fadeIn 1s ease;
  }

  #outcome.visible { display: flex; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  #outcome-graphic {
    width: min(320px, 80vw);
    height: auto;
  }

  #outcome-verdict {
    font-family: var(--font-deco);
    font-size: clamp(1.6rem, 6vw, 3rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    line-height: 1.2;
  }

  #outcome-verdict.admitted   { color: #7effa0; text-shadow: 0 0 40px #3a8a3a88; }
  #outcome-verdict.denied     { color: #ff7070; text-shadow: 0 0 40px #8a3a3a88; }
  #outcome-verdict.redirected { color: #ffd070; text-shadow: 0 0 40px #8a7a3a88; }

  #outcome-reason {
    font-family: var(--font-body);
    font-style: italic;
    font-size: clamp(0.85rem, 2.5vw, 1.05rem);
    color: var(--ash);
    max-width: 520px;
    line-height: 1.6;
  }

  #outcome-where {
    font-family: var(--font-head);
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #ffd070;
  }

  #outcome-seal {
    margin-top: 1rem;
    font-family: var(--font-head);
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #333;
  }
</style>
</head>
<body>

<header>
  <span id="conn-indicator" title="Connection status"></span>
  <h1>City of Dis — Administrative Front Desk</h1>
  <span id="status-badge">connecting…</span>
</header>

<div id="messages-container">
  <img id="minos-bg" src="minos_collat/minos_rest.png" alt="" aria-hidden="true">
  <div id="messages"></div>
</div>

<footer>
  <input id="input" type="text" placeholder="State your business…" disabled autocomplete="off">
  <button id="send-btn" disabled>Submit</button>
</footer>

<!-- Outcome screen — shown on terminal WS message -->
<div id="outcome" role="dialog" aria-modal="true">
  <div id="outcome-graphic" aria-hidden="true"></div>
  <div id="outcome-verdict"></div>
  <p id="outcome-reason"></p>
  <p id="outcome-where" style="display:none"></p>
  <p id="outcome-seal">City of Dis — Administrative Record</p>
</div>

<script>
  const messages  = document.getElementById('messages');
  const input     = document.getElementById('input');
  const sendBtn   = document.getElementById('send-btn');
  const badge     = document.getElementById('status-badge');
  const connDot   = document.getElementById('conn-indicator');
  const outcome   = document.getElementById('outcome');
  const minosBg   = document.getElementById('minos-bg');

  let ws;
  let thinkingEl       = null;
  let agentName        = 'Agent Minos';
  let currentMinosState = 'rest';

  // ── Minos image state machine ──────────────────────────────────────────────

  const MINOS_IMAGES = {
    rest:       'minos_collat/minos_rest.png',
    greet:      'minos_collat/minos_greet.png',
    explains:   'minos_collat/minos_explains.png',
    direct:     'minos_collat/minos_direct.png',
    disappoint: 'minos_collat/minos_disappoint.png',
    displeased: 'minos_collat/minos_displeased.png',
  };

  function pickMinosState(status, text) {
    if (status === 'admitted')   return 'greet';
    if (status === 'denied')     return 'displeased';
    if (status === 'redirected') return 'direct';
    if (!text) return currentMinosState;
    if (/cannot|not permitted|denied|refuse|forbidden|unauthorized|not allowed|regret|unfortunately|impossible/i.test(text)) {
      return 'disappoint';
    }
    if (/proceed|direct|report to|go to|escort|this way|make your way|you are to/i.test(text)) {
      return 'direct';
    }
    return 'explains';
  }

  function setMinosImage(state) {
    if (state === currentMinosState) return;
    currentMinosState = state;
    minosBg.classList.add('fading');
    setTimeout(() => {
      minosBg.src = MINOS_IMAGES[state] || MINOS_IMAGES.rest;
      minosBg.classList.remove('fading');
    }, 380);
  }

  // ── Gate SVG graphics ──────────────────────────────────────────────────────

  const GATE_OPEN = `<svg viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow-g"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- pillars -->
    <rect x="10" y="30" width="30" height="160" fill="#2a1a0a" stroke="#8a6a3a" stroke-width="1.5"/>
    <rect x="200" y="30" width="30" height="160" fill="#2a1a0a" stroke="#8a6a3a" stroke-width="1.5"/>
    <!-- arch -->
    <path d="M40 30 Q120 -20 200 30" fill="none" stroke="#8a6a3a" stroke-width="3"/>
    <!-- open gates (swung back) -->
    <rect x="12" y="30" width="55" height="110" rx="2" fill="#1a0a00" stroke="#5a4a2a" stroke-width="1"
          transform="skewX(-30) translate(18,0)"/>
    <rect x="173" y="30" width="55" height="110" rx="2" fill="#1a0a00" stroke="#5a4a2a" stroke-width="1"
          transform="skewX(30) translate(-18,0)"/>
    <!-- glow path through gate -->
    <ellipse cx="120" cy="110" rx="50" ry="70" fill="#7effa022" filter="url(#glow-g)"/>
    <!-- crossing runes -->
    <text x="25" y="22" font-size="12" fill="#8a6a3a" font-family="serif">⚔</text>
    <text x="203" y="22" font-size="12" fill="#8a6a3a" font-family="serif">⚔</text>
  </svg>`;

  const GATE_BARRED = `<svg viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow-r"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- pillars -->
    <rect x="10" y="30" width="30" height="160" fill="#2a0a0a" stroke="#8a3a3a" stroke-width="1.5"/>
    <rect x="200" y="30" width="30" height="160" fill="#2a0a0a" stroke="#8a3a3a" stroke-width="1.5"/>
    <!-- arch -->
    <path d="M40 30 Q120 -20 200 30" fill="none" stroke="#8a3a3a" stroke-width="3"/>
    <!-- closed gate panels -->
    <rect x="42" y="32" width="76" height="130" rx="2" fill="#1a0808" stroke="#6a2a2a" stroke-width="1.5"/>
    <rect x="122" y="32" width="76" height="130" rx="2" fill="#1a0808" stroke="#6a2a2a" stroke-width="1.5"/>
    <!-- vertical bars -->
    <line x1="60"  y1="32" x2="60"  y2="162" stroke="#4a1a1a" stroke-width="2"/>
    <line x1="80"  y1="32" x2="80"  y2="162" stroke="#4a1a1a" stroke-width="2"/>
    <line x1="100" y1="32" x2="100" y2="162" stroke="#4a1a1a" stroke-width="2"/>
    <line x1="140" y1="32" x2="140" y2="162" stroke="#4a1a1a" stroke-width="2"/>
    <line x1="160" y1="32" x2="160" y2="162" stroke="#4a1a1a" stroke-width="2"/>
    <line x1="180" y1="32" x2="180" y2="162" stroke="#4a1a1a" stroke-width="2"/>
    <!-- horizontal bar / lock -->
    <rect x="42" y="90" width="156" height="12" fill="#3a1010" stroke="#8a3a3a" stroke-width="1.5"/>
    <rect x="105" y="84" width="30" height="24" rx="3" fill="#2a0808" stroke="#c0392b" stroke-width="2"/>
    <!-- ember glow on bars -->
    <line x1="120" y1="32" x2="120" y2="162" stroke="#c0392b44" stroke-width="8" filter="url(#glow-r)"/>
  </svg>`;

  const GATE_REDIRECT = `<svg viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow-a"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>
    <!-- pillars -->
    <rect x="10" y="30" width="30" height="160" fill="#1a1a0a" stroke="#7a6a2a" stroke-width="1.5"/>
    <rect x="200" y="30" width="30" height="160" fill="#1a1a0a" stroke="#7a6a2a" stroke-width="1.5"/>
    <path d="M40 30 Q120 -20 200 30" fill="none" stroke="#7a6a2a" stroke-width="3"/>
    <!-- partially ajar gate -->
    <rect x="42" y="32" width="76" height="130" rx="2" fill="#151508" stroke="#5a5a1a" stroke-width="1.5"
          transform="skewX(-8)"/>
    <rect x="122" y="32" width="76" height="130" rx="2" fill="#151508" stroke="#5a5a1a" stroke-width="1.5"/>
    <!-- direction arrow -->
    <g filter="url(#glow-a)">
      <line x1="60" y1="100" x2="180" y2="100" stroke="#ffd070" stroke-width="3"/>
      <polygon points="175,90 195,100 175,110" fill="#ffd070"/>
    </g>
    <text x="85" y="145" font-size="11" fill="#9a8a3a" font-family="serif" text-anchor="middle">This way</text>
  </svg>`;

  function showOutcome(status, text, reason, where_) {
    // Show last agent message first, then fade to outcome
    appendBubble('agent', text, agentName);

    setTimeout(() => {
      const verdict  = document.getElementById('outcome-verdict');
      const reasonEl = document.getElementById('outcome-reason');
      const whereEl  = document.getElementById('outcome-where');
      const graphic  = document.getElementById('outcome-graphic');

      if (status === 'admitted') {
        verdict.textContent  = 'Entry Granted';
        verdict.className    = 'admitted';
        graphic.innerHTML    = GATE_OPEN;
      } else if (status === 'redirected') {
        verdict.textContent  = 'You Have Been Redirected';
        verdict.className    = 'redirected';
        graphic.innerHTML    = GATE_REDIRECT;
      } else {
        verdict.textContent  = 'Entry Denied';
        verdict.className    = 'denied';
        graphic.innerHTML    = GATE_BARRED;
      }

      reasonEl.textContent = reason || '';

      if (where_ && where_.trim()) {
        whereEl.textContent = `Proceed to: ${where_}`;
        whereEl.style.display = '';
      } else {
        whereEl.style.display = 'none';
      }

      outcome.classList.add('visible');
    }, 1800);
  }

  // ── WebSocket ──────────────────────────────────────────────────────────────

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      connDot.className = 'open';
      badge.textContent = 'Active';
      badge.className   = 'active';
      input.disabled    = false;
      sendBtn.disabled  = false;
      input.focus();
      setMinosImage('greet');
    };

    ws.onmessage = (evt) => {
      removeThinking();
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }

      if (data.type === 'agent') {
        appendBubble('agent', data.text, agentName);
        setStatus(data.status);
        setMinosImage(pickMinosState(data.status, data.text));
      } else if (data.type === 'terminal') {
        setStatus(data.status);
        disableInput();
        setMinosImage(pickMinosState(data.status, data.text));
        showOutcome(data.status, data.text, data.reason, data.where);
      } else if (data.type === 'error') {
        appendNote(data.text);
      }
    };

    ws.onclose = () => {
      connDot.className = 'closed';
      disableInput();
      if (!outcome.classList.contains('visible')) {
        const terminalStatuses = ['admitted', 'denied', 'redirected'];
        if (!terminalStatuses.includes(badge.className)) {
          appendNote('Connection closed.');
          badge.textContent = 'Disconnected';
          badge.className   = '';
        }
      }
    };

    ws.onerror = () => {
      connDot.className = 'error';
      appendNote('Connection error. Refresh to retry.');
    };
  }

  function send() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    appendBubble('user', text);
    input.value = '';
    showThinking();
    ws.send(text);
  }

  // ── DOM helpers ────────────────────────────────────────────────────────────

  function appendBubble(role, text, speaker) {
    if (role === 'system-note') {
      const div = document.createElement('div');
      div.className = 'system-note';
      div.textContent = text;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
      return div;
    }

    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${role}`;

    const lbl = document.createElement('div');
    lbl.className = 'msg-label';
    lbl.textContent = role === 'user' ? 'Visitor' : (speaker || agentName);

    const bub = document.createElement('div');
    bub.className = `bubble ${role}`;
    bub.textContent = text;

    wrap.appendChild(lbl);
    wrap.appendChild(bub);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return bub;
  }

  function appendNote(text) {
    appendBubble('system-note', text);
  }

  function showThinking() {
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.textContent = `${agentName} is consulting the records…`;
    messages.appendChild(thinkingEl);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeThinking() {
    if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }

  function setStatus(s) {
    const labels = { active: 'Active', admitted: 'Admitted', denied: 'Denied', redirected: 'Redirected' };
    badge.textContent = labels[s] || s;
    badge.className   = s || '';
  }

  function disableInput() {
    input.disabled   = true;
    sendBtn.disabled = true;
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

  connect();
</script>
</body>
</html>
