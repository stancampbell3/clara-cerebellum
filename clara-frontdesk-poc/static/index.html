<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City of Dis — Front Desk</title>
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #1a1010;
    --border:   #3d1a1a;
    --ember:    #c0392b;
    --ember-lo: #7b1a1a;
    --ash:      #8a8a8a;
    --bone:     #d4c8b8;
    --agent-bg: #1e1010;
    --user-bg:  #0a1a2e;
    --admitted: #1a4a1a;
    --denied:   #4a1a1a;
    --redirect: #2a2a1a;
    --font:     "Georgia", serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--bone);
    font-family: var(--font);
    height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  header h1 {
    font-size: 1.1rem;
    color: var(--ember);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  #status-badge {
    margin-left: auto;
    padding: 0.25rem 0.75rem;
    border-radius: 999px;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border: 1px solid var(--border);
    background: #111;
    color: var(--ash);
    transition: background 0.4s, color 0.4s;
  }

  #status-badge.admitted  { background: var(--admitted); color: #7effa0; border-color: #3a8a3a; }
  #status-badge.denied    { background: var(--denied);   color: #ff9090; border-color: #8a3a3a; }
  #status-badge.redirected{ background: var(--redirect); color: #ffd070; border-color: #8a7a3a; }
  #status-badge.active    { color: var(--bone); }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .bubble {
    max-width: 72%;
    padding: 0.65rem 0.9rem;
    border-radius: 4px;
    line-height: 1.5;
    font-size: 0.92rem;
    white-space: pre-wrap;
  }

  .bubble.agent {
    background: var(--agent-bg);
    border: 1px solid var(--ember-lo);
    color: var(--bone);
    align-self: flex-start;
  }

  .bubble.agent::before {
    content: attr(data-speaker) " ";
    display: block;
    font-size: 0.7rem;
    color: var(--ember);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
  }

  .bubble.user {
    background: var(--user-bg);
    border: 1px solid #1a3a5a;
    color: #b8c8d8;
    align-self: flex-end;
    text-align: right;
  }

  .bubble.user::before {
    content: "Visitor";
    display: block;
    font-size: 0.7rem;
    color: #4a8ab8;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.3rem;
    text-align: right;
  }

  .bubble.system-note {
    align-self: center;
    background: transparent;
    border: none;
    color: var(--ash);
    font-size: 0.78rem;
    font-style: italic;
    max-width: 90%;
    text-align: center;
  }

  .thinking {
    align-self: flex-start;
    color: var(--ember-lo);
    font-size: 0.8rem;
    font-style: italic;
    animation: pulse 1.2s infinite;
  }

  @keyframes pulse { 0%,100%{opacity:.4} 50%{opacity:1} }

  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 0.75rem 1rem;
    display: flex;
    gap: 0.5rem;
  }

  #input {
    flex: 1;
    background: #0d0d0d;
    border: 1px solid var(--border);
    color: var(--bone);
    padding: 0.5rem 0.75rem;
    font-family: var(--font);
    font-size: 0.92rem;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.2s;
  }
  #input:focus { border-color: var(--ember-lo); }
  #input:disabled { opacity: 0.4; cursor: not-allowed; }

  #send-btn {
    background: var(--ember-lo);
    border: none;
    color: var(--bone);
    padding: 0.5rem 1rem;
    cursor: pointer;
    font-family: var(--font);
    border-radius: 3px;
    transition: background 0.2s;
  }
  #send-btn:hover { background: var(--ember); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #conn-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #555;
    margin-right: 0.25rem;
    display: inline-block;
    flex-shrink: 0;
    align-self: center;
  }
  #conn-indicator.open    { background: #4a8a4a; }
  #conn-indicator.closed  { background: #8a4a4a; }
  #conn-indicator.error   { background: var(--ember); }
</style>
</head>
<body>

<header>
  <span id="conn-indicator" title="Connection status"></span>
  <h1>City of Dis — Administrative Front Desk</h1>
  <span id="status-badge">connecting…</span>
</header>

<div id="messages"></div>

<footer>
  <input id="input" type="text" placeholder="State your business…" disabled autocomplete="off">
  <button id="send-btn" disabled>Submit</button>
</footer>

<script>
  const messages  = document.getElementById('messages');
  const input     = document.getElementById('input');
  const sendBtn   = document.getElementById('send-btn');
  const badge     = document.getElementById('status-badge');
  const connDot   = document.getElementById('conn-indicator');

  let ws;
  let thinkingEl = null;
  let agentName  = 'Agent Minos';

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      connDot.className = 'open';
      badge.textContent = 'Active';
      badge.className   = 'active';
      input.disabled    = false;
      sendBtn.disabled  = false;
      input.focus();
    };

    ws.onmessage = (evt) => {
      removeThinking();
      let data;
      try { data = JSON.parse(evt.data); } catch { return; }

      if (data.type === 'agent') {
        appendBubble('agent', data.text, agentName);
        setStatus(data.status);
        if (data.status === 'admitted' || data.status === 'denied' || data.status === 'redirected') {
          disableInput();
        }
      } else if (data.type === 'error') {
        appendNote(data.text);
      }
    };

    ws.onclose = () => {
      connDot.className = 'closed';
      disableInput();
      if (!['admitted','denied','redirected'].includes(badge.className)) {
        appendNote('Connection closed.');
        badge.textContent = 'Disconnected';
        badge.className   = '';
      }
    };

    ws.onerror = () => {
      connDot.className = 'error';
      appendNote('Connection error. Refresh to retry.');
    };
  }

  function send() {
    const text = input.value.trim();
    if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
    appendBubble('user', text);
    input.value = '';
    showThinking();
    ws.send(text);
  }

  function appendBubble(role, text, speaker) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;
    if (role === 'agent' && speaker) div.setAttribute('data-speaker', speaker);
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
  }

  function appendNote(text) {
    const div = document.createElement('div');
    div.className = 'bubble system-note';
    div.textContent = text;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  function showThinking() {
    thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.textContent = `${agentName} is consulting the records…`;
    messages.appendChild(thinkingEl);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeThinking() {
    if (thinkingEl) { thinkingEl.remove(); thinkingEl = null; }
  }

  function setStatus(s) {
    const labels = { active: 'Active', admitted: 'Admitted', denied: 'Denied', redirected: 'Redirected' };
    badge.textContent = labels[s] || s;
    badge.className   = s || '';
  }

  function disableInput() {
    input.disabled   = true;
    sendBtn.disabled = true;
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

  connect();
</script>
</body>
</html>
